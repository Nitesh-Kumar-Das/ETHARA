services:
  # --- FastAPI Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethara-backend
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-taskmanager}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    networks:
      - ethara-network

  # --- Next.js Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: ethara-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - ethara-network

networks:
  ethara-network:
    driver: bridge
